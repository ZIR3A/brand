<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChromaRoom | Color Theme Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ivory: '#F6F1E8',
                        'ivory-soft': '#F2E9DC',
                        taupe: '#D8CFC4',
                        'taupe-soft': '#C2B6A8',
                        ceiling: '#FBF8F3',
                        charcoal: '#3A3A3A',
                        sage: '#C7D1C4',
                        'dusty-blue': '#A7B7C9',
                        terracotta: '#C97C5D',
                        'soft-gold': '#D6C3A3',
                        'text-primary': '#1A1A1A',
                        'text-secondary': '#5F5F5F',
                        accent: '#8B7D6B',
                        'linen-white': '#F3EFE7',
                        'almond-beige': '#EADFCC',
                        'desert-sand': '#DCC7AA',
                        'eucalyptus-green': '#BFCBC2',
                        'silver-mist': '#DADFE3',
                        'ash-grey': '#C6C6C6',
                        'steel-blue-grey': '#9FAFBA',
                        'fog-blue': '#C9D6DF',
                        'muted-coral-clay': '#D7A58C',
                        'burnt-sand': '#C89B7B',
                        'honey-beige': '#E6CFAE',
                        'cocoa-brown': '#6F5A4B',
                    },
                    fontFamily: { inter: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { scroll-behavior: smooth; }
        body { font-family: 'Inter', system-ui, sans-serif; margin: 0; }
        .glass-card-dark {
            background: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.15);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-ivory">
    <div id="root"></div>
    
    <script type="text/babel">
        const Navbar = () => (
            <nav className="fixed top-0 left-0 right-0 z-50 bg-ivory/90 backdrop-blur-lg border-b border-ivory-soft">
                <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-center">
                    <span className="text-lg font-semibold text-text-primary tracking-tight">Colors For Navaraj Home</span>
                </div>
            </nav>
        );

        const colors = [
            { name: 'Warm Greige', hex: '#E6DED3', description: 'Between grey and beige, super modern and versatile.', textColor: '#1A1A1A', cardStyle: 'dark' },
            { name: 'Soft Olive', hex: '#B7C0A3', description: 'Earthy, mature, and calming. Less green, more refined.', textColor: '#1A1A1A', cardStyle: 'dark' },
            { name: 'Muted Lavender Grey', hex: '#CFC9D9', description: 'Subtle luxury tone that adds uniqueness without being loud.', textColor: '#1A1A1A', cardStyle: 'dark' },
            { name: 'Pale Clay', hex: '#D9B8A6', description: 'Warm, soft, with a slightly artistic feel.', textColor: '#1A1A1A', cardStyle: 'dark' },
            { name: 'Misty Blue Grey', hex: '#B8C4CC', description: 'Clean, airy, and modern. Great for a tech-Forward vibe.', textColor: '#1A1A1A', cardStyle: 'dark' },
            { name: 'Deep Mocha', hex: '#8A6F5A', description: 'Rich accent tone that pairs beautifully with ivory.', textColor: '#FFFFFF', cardStyle: 'light' },
            { name: 'Soft Blush Nude', hex: '#E8D6CF', description: 'Very subtle warmth. Aesthetic without being pink-heavy.', textColor: '#1A1A1A', cardStyle: 'dark' },
            { name: 'Cool Stone Grey', hex: '#D1D3D4', description: 'Minimal and neutral. Great for balancing stronger tones.', textColor: '#1A1A1A', cardStyle: 'dark' },
            { name: 'Forest Mist Green', hex: '#AEB9AE', description: 'Slightly deeper than sage. More grounded and elegant.', textColor: '#1A1A1A', cardStyle: 'dark' },
            { name: 'Champagne Beige', hex: '#F1E4D1', description: 'Bright and luxurious. Slightly golden undertone.', textColor: '#1A1A1A', cardStyle: 'dark' },
            { name: 'Linen White', hex: '#F3EFE7', description: 'Slightly warmer than ivory, very soft and bright.', textColor: '#1A1A1A', cardStyle: 'dark' },
            { name: 'Almond Beige', hex: '#EADFCC', description: 'Smooth, creamy beige—safe and elegant.', textColor: '#1A1A1A', cardStyle: 'dark' },
            { name: 'Desert Sand', hex: '#DCC7AA', description: 'Warm and grounded, great accent wall tone.', textColor: '#1A1A1A', cardStyle: 'dark' },
            { name: 'Eucalyptus Green', hex: '#BFCBC2', description: 'Cleaner and lighter than sage, very modern.', textColor: '#1A1A1A', cardStyle: 'dark' },
            { name: 'Silver Mist', hex: '#DADFE3', description: 'Light cool grey with blue hint, very airy.', textColor: '#1A1A1A', cardStyle: 'dark' },
            { name: 'Ash Grey', hex: '#C6C6C6', description: 'Neutral grey, balances warm tones.', textColor: '#1A1A1A', cardStyle: 'dark' },
            { name: 'Steel Blue Grey', hex: '#9FAFBA', description: 'Stronger modern tone, good for contrast.', textColor: '#1A1A1A', cardStyle: 'dark' },
            { name: 'Fog Blue', hex: '#C9D6DF', description: 'Soft, calming, slightly brighter than misty blue.', textColor: '#1A1A1A', cardStyle: 'dark' },
            { name: 'Muted Coral Clay', hex: '#D7A58C', description: 'Artistic, warm, but still toned down.', textColor: '#1A1A1A', cardStyle: 'dark' },
            { name: 'Burnt Sand', hex: '#C89B7B', description: 'Deeper terracotta variation, rich feel.', textColor: '#1A1A1A', cardStyle: 'dark' },
            { name: 'Honey Beige', hex: '#E6CFAE', description: 'Warm glow, works beautifully in soft lighting.', textColor: '#1A1A1A', cardStyle: 'dark' },
            { name: 'Cocoa Brown', hex: '#6F5A4B', description: 'Deep, rich, pairs perfectly with ivory + black.', textColor: '#FFFFFF', cardStyle: 'light' }
        ];

        const ColorShowcase = () => (
            <section id="colors" className="bg-ivory pt-20">
                {colors.map((color) => (
                    <div 
                        key={color.hex} 
                        className="min-h-screen flex items-center justify-center relative"
                        style={{ backgroundColor: color.hex }}
                    >
                        <div className={`max-w-2xl mx-6 ${color.cardStyle === 'dark' ? 'glass-card-dark' : 'glass-card'} rounded-3xl p-10 md:p-14 text-center`}
                            style={{ color: color.textColor }}>
                            <p className="text-sm uppercase tracking-widest mb-4 opacity-60 font-medium">{color.hex}</p>
                            <h2 className="text-5xl md:text-6xl font-bold mb-6 tracking-tight">{color.name}</h2>
                            <p className="text-lg font-light leading-relaxed opacity-80 max-w-md mx-auto">{color.description}</p>
                        </div>
                    </div>
                ))}
            </section>
        );

        const App = () => (
            <div>
                <Navbar />
                <ColorShowcase />
            </div>
        );

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
